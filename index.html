<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>

<title>Chat Pals</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:1rem;}
#root{width:100%;max-width:480px;}
.screen{background:#fff;border-radius:24px;padding:24px;margin-top:8px;box-shadow:0 8px 32px rgba(0,0,0,0.18);}
.title{text-align:center;margin-bottom:20px;}
.title h1{font-size:32px;font-weight:800;color:#5b21b6;}
.title p{font-size:14px;color:#888;margin-top:4px;}
.stars{font-size:22px;letter-spacing:4px;margin-bottom:4px;}
.section-label{font-size:13px;font-weight:700;color:#7c3aed;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.name-input{width:100%;padding:12px 14px;font-size:16px;border:2px solid #e0d7f7;border-radius:14px;outline:none;color:#222;margin-bottom:16px;}

.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;}

.sel-btn.sel{border-color:#7c3aed;background:#ede9fe;}
.sel-btn .ico{font-size:24px;display:block;margin-bottom:4px;}
.sel-btn .lbl{font-size:12px;font-weight:700;color:#5b21b6;}
.sel-btn .sub{font-size:10px;color:#888;margin-top:2px;}
.timer-opt{padding:10px 4px;border-radius:12px;border:2px solid #e0d7f7;background:#faf7ff;cursor:pointer;font-family:inherit;font-weight:700;font-size:13px;color:#888;text-align:center;}
.timer-opt.sel{border-color:#7c3aed;background:#ede9fe;color:#5b21b6;}
.start-btn{width:100%;padding:14px;font-size:17px;font-weight:700;color:#fff;border:none;border-radius:16px;cursor:pointer;}

.hud-score{font-size:13px;font-weight:700;color:#7c3aed;}
.timer-wrap{margin-bottom:12px;}
.timer-bar{height:8px;background:#e0d7f7;border-radius:99px;overflow:hidden;}
.timer-fill{height:100%;border-radius:99px;transition:width .9s linear;}
.progress-bar{height:5px;background:#e0d7f7;border-radius:99px;margin-bottom:14px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,#7c3aed,#a855f7);border-radius:99px;transition:width .4s;}
.mission-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.char-face-sm{font-size:30px;background:#ede9fe;border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;}
.char-name{font-size:14px;font-weight:700;color:#5b21b6;}
.mission-lbl{font-size:11px;color:#888;}
.chat-area{min-height:140px;margin-bottom:12px;}
.bubble-wrap{display:flex;align-items:flex-end;gap:8px;margin-bottom:12px;animation:fadeIn .3s ease;}
.bubble-wrap.ai{flex-direction:row;}
.bubble-wrap.user{flex-direction:row-reverse;}
.bubble-avatar{font-size:20px;flex-shrink:0;}
.bubble{padding:10px 14px;border-radius:18px;font-size:15px;line-height:1.5;max-width:85%;}
.bubble.ai{background:#ede9fe;color:#3b0764;border-bottom-left-radius:4px;}
.bubble.user{background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;border-bottom-right-radius:4px;}
.bubble.wrong-user{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;border-bottom-right-radius:4px;}
.typing{display:flex;gap:4px;padding:10px 14px;background:#ede9fe;border-radius:18px;border-bottom-left-radius:4px;}
.dot{width:7px;height:7px;background:#a855f7;border-radius:50%;animation:bounce .9s infinite;}
.dot:nth-child(2){animation-delay:.15s;}
.dot:nth-child(3){animation-delay:.3s;}
@keyframes bounce{0%,80%,100%{transform:translateY(0);}40%{transform:translateY(-8px);}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.reply-area{display:flex;flex-direction:column;gap:8px;}
.reply-hint{font-size:12px;color:#aaa;margin-bottom:2px;text-align:center;}
.reply-btn{padding:11px 15px;border-radius:14px;border:2px solid #e0d7f7;background:#faf7ff;cursor:pointer;font-size:14px;font-family:inherit;color:#3b0764;text-align:left;font-weight:500;transition:all .15s;}
.reply-btn:hover{border-color:#7c3aed;background:#ede9fe;}
.reply-btn:disabled{cursor:default;opacity:0.6;}
.feedback-pop{text-align:center;padding:8px 0;animation:pop .35s ease;}
@keyframes pop{0%{transform:scale(0);}70%{transform:scale(1.15);}100%{transform:scale(1);}}
.feedback-emoji{font-size:32px;}
.feedback-txt{font-size:13px;font-weight:700;margin-top:2px;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:14px 0;}
.stat-card{background:#faf7ff;border-radius:14px;padding:12px 6px;text-align:center;}
.stat-val{font-size:24px;font-weight:800;color:#7c3aed;}
.stat-lbl{font-size:11px;color:#888;margin-top:2px;}
.badge-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:10px 0 18px;}
.badge{background:#fef3c7;border:2px solid #fde68a;border-radius:99px;padding:5px 13px;font-size:12px;font-weight:700;color:#92400e;}
.big-btn{width:100%;padding:13px;font-size:15px;font-weight:700;border:none;border-radius:16px;cursor:pointer;margin-bottom:8px;}
.exit-btn{background:none;border:none;font-size:13px;color:#aaa;cursor:pointer;padding:4px 8px;}
.gameover{text-align:center;padding:8px 0;}
.gameover .face{font-size:64px;margin-bottom:8px;}

// ── Speech ────────────────────────────────────────────────
var _voice = null;
function getVoice() {
  if (_voice) return _voice;
  var vs = window.speechSynthesis.getVoices();
  _voice = vs.find(function(v){ return v.name === 'Samantha'; })
    || vs.find(function(v){ return v.name === 'Google US English'; })
    || vs.find(function(v){ return v.lang === 'en-US' && v.localService; })
    || vs.find(function(v){ return v.lang.startsWith('en'); })
    || null;
  return _voice;
}
window.speechSynthesis.getVoices();
window.speechSynthesis.onvoiceschanged = function(){ _voice = null; getVoice(); };

var audioQueue = Promise.resolve();
var audioGeneration = 0;

function resetAudioQueue() {
  audioGeneration += 1;
  audioQueue = Promise.resolve();
  try { window.speechSynthesis.cancel(); } catch (e) {}
}

function queueAudio(task) {
  var generation = audioGeneration;
  audioQueue = audioQueue
    .catch(function(){})
    .then(function(){
      if (generation !== audioGeneration) return;
      return task(generation);
    })
    .catch(function(){});
  return audioQueue;
}

function speakText(text, generation) {
  return new Promise(function(resolve) {
    try {
      if (generation !== audioGeneration) return resolve();
      var u = new SpeechSynthesisUtterance(text);
      var v = getVoice();
      if (v) u.voice = v;
      u.lang = 'en-US';
      u.rate = 0.95;
      u.pitch = 1.2;
      u.volume = 1;
      u.onend = resolve;
      u.onerror = resolve;
      window.speechSynthesis.speak(u);
    } catch (e) {
      resolve();
    }
  });
}

function say(text) {
  return queueAudio(function(generation) {
    return speakText(text, generation);
  });
}

function saySequence(lines) {
  (lines || []).forEach(function(line) {
    say(line);
  });
}

function rnd(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function buildMission(ageGroup, charName, kidName) {
  var pool = shuffle(QUESTIONS[ageGroup]);
  var steps = pool.slice(0, 5).map(function(q) {
    return { ai: q.ai, replies: shuffle(q.replies) };
  });
  var topics = { '5-6':'Fun Questions', '7-9':'Challenge Quiz', '10-13':'Deep Thinking' };
  return { title: charName + ' and ' + kidName + ': ' + topics[ageGroup], steps: steps };
}

var CHARACTERS = [
  { id:'zara', name:'Zara', emoji:'🤖', desc:'Friendly Robot' },
  { id:'finn', name:'Finn', emoji:'🐬', desc:'Ocean Explorer' },

var AGE_GROUPS = [
  { id:'5-6',   label:'Ages 5-6',   emoji:'🌱', desc:'Simple & fun' },
  { id:'7-9',   label:'Ages 7-9',   emoji:'🌟', desc:'Getting clever' },
  { id:'10-13', label:'Ages 10-13', emoji:'🚀', desc:'Deep thinker' }
];
var TIMER_OPTIONS = [30, 60, 90, 120];
var MAX_LIVES = 3;

function App() {
  var s = useState;
  var phase       = s('start');
  var nameInput   = s('');
  var kidName     = s('');
  var ageGroup    = s('');
  var charId      = s('');
  var timerSec    = s(90);
  var mission     = s(null);
  var stepIdx     = s(0);
  var chatLog     = s([]);
  var showReplies = s(false);
  var typing      = s(false);
  var locked      = s(false);
  var score       = s(0);
  var lives       = s(MAX_LIVES);
  var timeLeft    = s(90);
  var feedback    = s(null);

  var setPhase       = phase[1];       phase       = phase[0];
  var setNameInput   = nameInput[1];   nameInput   = nameInput[0];
  var setKidName     = kidName[1];     kidName     = kidName[0];
  var setAgeGroup    = ageGroup[1];    ageGroup    = ageGroup[0];
  var setCharId      = charId[1];      charId      = charId[0];
  var setTimerSec    = timerSec[1];    timerSec    = timerSec[0];
  var setMission     = mission[1];     mission     = mission[0];
  var setStepIdx     = stepIdx[1];     stepIdx     = stepIdx[0];
  var setChatLog     = chatLog[1];     chatLog     = chatLog[0];
  var setShowReplies = showReplies[1]; showReplies = showReplies[0];
  var setTyping      = typing[1];      typing      = typing[0];
  var setLocked      = locked[1];      locked      = locked[0];
  var setScore       = score[1];       score       = score[0];
  var setLives       = lives[1];       lives       = lives[0];
  var setTimeLeft    = timeLeft[1];    timeLeft    = timeLeft[0];
  var setFeedback    = feedback[1];    feedback    = feedback[0];

  var chatEndRef  = useRef(null);
  var missionRef  = useRef(null);
  var stepRef     = useRef(0);
  var livesRef    = useRef(MAX_LIVES);
  var timerRef    = useRef(null);

  var char = CHARACTERS.find(function(c){ return c.id === charId; }) || CHARACTERS[0];

  useEffect(function(){
    if (chatEndRef.current) chatEndRef.current.scrollIntoView({ behavior:'smooth' });
  }, [chatLog, typing, showReplies, feedback]);

  var showAiMsg = useCallback(function(m, idx) {
    if (!m || !m.steps || idx >= m.steps.length) return;
    var txt = m.steps[idx].ai;
    setTyping(true);
    setTimeout(function(){
      setTyping(false);
      setChatLog(function(l){ return l.concat([{ role:'ai', text:txt }]); });
      setShowReplies(true);
      say(txt);
      saySequence(m.steps[idx].replies.map(function(r){ return r.text; }));
    }, Math.min(700 + txt.length * 11, 1800));
  }, []);

  var handleTimeout = useCallback(function(){
    var m = missionRef.current;
    var idx = stepRef.current;
    if (!m) return;
    setLocked(true); setShowReplies(false);
    var newLives = livesRef.current - 1;
    livesRef.current = newLives;
    setLives(newLives);
    say(rnd(PHRASES.timeout));
    setFeedback({ emoji:'⏰', txt:'Time is up! You lost a heart!', color:'#dc2626' });
    setChatLog(function(l){ return l.concat([{ role:'user', text:'Time ran out!', isWrong:true }]); });
    setTimeout(function(){ setFeedback(null); }, 1500);
    if (newLives <= 0) { setTimeout(function(){ setPhase('gameover'); }, 1800); return; }
    var cr = m.steps[idx].replies.find(function(r){ return r.correct && r.score === 3; })
          || m.steps[idx].replies.find(function(r){ return r.correct; });
    var reaction = cr ? 'Time is up! The best answer was: ' + cr.text + '. Keep going!' : 'Time is up! Keep going!';
    setTimeout(function(){
      setTyping(true);
      setTimeout(function(){
        setTyping(false);
        setChatLog(function(l){ return l.concat([{ role:'ai', text:reaction }]); });
        say(reaction);
        advanceStep(m, idx);
      }, 1200);
    }, 1800);
  }, []);

  useEffect(function(){
    if (!showReplies || locked) return;
    setTimeLeft(timerSec);
    timerRef.current = setInterval(function(){
      setTimeLeft(function(t){
        if (t <= 1) { clearInterval(timerRef.current); handleTimeout(); return 0; }
        return t - 1;
      });
    }, 1000);
    return function(){ clearInterval(timerRef.current); };
  }, [showReplies, locked, timerSec, handleTimeout]);

  function advanceStep(m, idx) {
    var next = idx + 1;
    if (next >= m.steps.length) {
      setTimeout(function(){ setPhase('result'); }, 700);
    } else {
      stepRef.current = next;
      setStepIdx(next);
      setTimeout(function(){ setLocked(false); showAiMsg(m, next); }, 500);
    }
  }

  function startGame() {
    if (!ageGroup || !charId) { alert('Please pick an age group and a Chat Pal!'); return; }
    resetAudioQueue();
    var name = nameInput.trim() || 'Friend';
    setKidName(name);
    var m = buildMission(ageGroup, char.name, name);
    missionRef.current = m;
    stepRef.current = 0;
    livesRef.current = MAX_LIVES;
    setMission(m);
    setStepIdx(0);
    setScore(0);
    setLives(MAX_LIVES);
    setChatLog([]);
    setShowReplies(false);
    setLocked(false);
    setFeedback(null);
    say(rnd(PHRASES.start));
    setPhase('chat');
    setTimeout(function(){ showAiMsg(m, 0); }, 800);
  }

  function pickReply(reply) {
    if (locked) return;
    clearInterval(timerRef.current);
    setLocked(true); setShowReplies(false);
    var m = missionRef.current;
    var sIdx = stepRef.current;
    var isCorrect = reply.correct !== false && reply.score > 0;
    setChatLog(function(l){ return l.concat([{ role:'user', text:reply.text, isWrong:!isCorrect }]); });
    if (isCorrect) {
      setScore(function(sc){ return sc + reply.score; });
      say(reply.score === 3 ? rnd(PHRASES.perfect) : rnd(PHRASES.correct));
      setFeedback({ emoji:'⭐', txt: reply.score === 3 ? 'Amazing answer!' : 'Good job!', color:'#16a34a' });
    } else {
      var newLives = livesRef.current - 1;
      livesRef.current = newLives; setLives(newLives);
      say(rnd(PHRASES.wrong));
      setFeedback({ emoji:'💔', txt:'Wrong answer! Lost a heart!', color:'#dc2626' });
      if (newLives <= 0) {
        setTimeout(function(){ setFeedback(null); }, 1400);
        say(rnd(PHRASES.gameover));
        setTimeout(function(){
          setTyping(true);
          setTimeout(function(){
            setTyping(false);
            setChatLog(function(l){ return l.concat([{ role:'ai', text:reply.reaction }]); });
            say(reply.reaction);
            setTimeout(function(){ setPhase('gameover'); }, 900);
          }, 1000);
        }, 1500);
        return;
      }
    }
    setTimeout(function(){ setFeedback(null); }, 1400);
    setTimeout(function(){
      setTyping(true);
      setTimeout(function(){
        setTyping(false);
        setChatLog(function(l){ return l.concat([{ role:'ai', text:reply.reaction }]); });
        say(reply.reaction);
        advanceStep(m, sIdx);
      }, Math.min(500 + reply.reaction.length * 11, 1800));
    }, 1500);
  }

  function exitGame() {
    clearInterval(timerRef.current);
    resetAudioQueue();
    setPhase('start'); setMission(null);
  }

  function playAgain() {
    clearInterval(timerRef.current);
    resetAudioQueue();
    var m = buildMission(ageGroup, char.name, kidName);
    missionRef.current = m;
    stepRef.current = 0;
    livesRef.current = MAX_LIVES;
    setMission(m);
    setStepIdx(0); setScore(0); setLives(MAX_LIVES);
    setChatLog([]); setShowReplies(false); setLocked(false); setFeedback(null);
    say(rnd(PHRASES.start));
    setPhase('chat');
    setTimeout(function(){ showAiMsg(m, 0); }, 800);
  }

  var timerColor = timeLeft > timerSec * 0.5 ? '#7c3aed' : timeLeft > timerSec * 0.25 ? '#f59e0b' : '#dc2626';
  var timerPct   = (timeLeft / timerSec) * 100;

  // ── Start ──
  if (phase === 'start') return (
    React.createElement('div', { className:'screen' },
      React.createElement('div', { className:'title' },
        React.createElement('div', { className:'stars' }, '⭐🌟✨'),
        React.createElement('h1', null, 'Chat Pals'),
        React.createElement('p', null, 'Challenge Mode — ❤️❤️❤️ 3 Lives · ⏱️ ' + timerSec + 's Timer')
      ),
      React.createElement('div', { className:'section-label' }, 'Your name'),
      React.createElement('input', { className:'name-input', value:nameInput, placeholder:'Enter your name...', onChange:function(e){ setNameInput(e.target.value); }, onKeyDown:function(e){ if(e.key==='Enter') startGame(); } }),
      React.createElement('div', { className:'section-label' }, 'Age group'),
      React.createElement('div', { className:'grid3' },
        AGE_GROUPS.map(function(g){
          return React.createElement('button', { key:g.id, className:'sel-btn' + (ageGroup===g.id?' sel':''), onClick:function(){ setAgeGroup(g.id); } },
            React.createElement('span', { className:'ico' }, g.emoji),
            React.createElement('span', { className:'lbl' }, g.label),
            React.createElement('span', { className:'sub' }, g.desc)
          );
        })
      ),
      React.createElement('div', { className:'section-label' }, 'Timer per question'),
      React.createElement('div', { className:'grid4' },
        TIMER_OPTIONS.map(function(t){
          return React.createElement('button', { key:t, className:'timer-opt' + (timerSec===t?' sel':''), onClick:function(){ setTimerSec(t); } }, t + 's');
        })
      ),
      React.createElement('div', { className:'section-label' }, 'Choose your Chat Pal'),
      React.createElement('div', { className:'grid3' },
        CHARACTERS.map(function(c){
          return React.createElement('button', { key:c.id, className:'sel-btn' + (charId===c.id?' sel':''), onClick:function(){ setCharId(c.id); } },
            React.createElement('span', { className:'ico' }, c.emoji),
            React.createElement('span', { className:'lbl' }, c.name),
            React.createElement('span', { className:'sub' }, c.desc)
          );
        })
      ),
      React.createElement('button', { className:'start-btn', onClick:startGame, style:{ background: ageGroup&&charId ? 'linear-gradient(135deg,#7c3aed,#a855f7)' : '#ccc', cursor: ageGroup&&charId ? 'pointer' : 'not-allowed' } },
        ageGroup && charId ? 'Start Challenge! 🚀' : 'Pick age group and pal first'
      )
    )
  );

  // ── Chat ──
  if (phase === 'chat' && mission) return (
    React.createElement('div', { className:'screen' },
      React.createElement('div', { className:'hud' },
        React.createElement('div', { className:'lives' },
          Array.from({ length:MAX_LIVES }).map(function(_,i){ return React.createElement('span', { key:i }, i < lives ? '❤️' : '🖤'); })
        ),
        React.createElement('div', { style:{ display:'flex', gap:10, alignItems:'center' } },
          React.createElement('span', { style:{ fontSize:13, fontWeight:700, color:'#7c3aed' } }, '⭐ ' + score),
          React.createElement('button', { className:'exit-btn', onClick:exitGame }, '✕ Exit')

      React.createElement('div', { className:'timer-wrap' },
        React.createElement('div', { style:{ display:'flex', justifyContent:'space-between', fontSize:12, color:timerColor, fontWeight:700, marginBottom:4 } },
          React.createElement('span', null, '⏱️ Time'),
          React.createElement('span', null, timeLeft + 's')
        ),
        React.createElement('div', { className:'timer-bar' },
          React.createElement('div', { className:'timer-fill', style:{ width:timerPct+'%', background:timerColor } })
        )

      React.createElement('div', { className:'mission-header' },
        React.createElement('div', { className:'char-face-sm' }, char.emoji),
        React.createElement('div', null,
          React.createElement('div', { className:'char-name' }, char.name),
          React.createElement('div', { className:'mission-lbl' }, mission.title + ' · Round ' + (stepIdx+1) + '/' + mission.steps.length)
        )
      ),
      React.createElement('div', { className:'progress-bar' },
        React.createElement('div', { className:'progress-fill', style:{ width: (stepIdx/mission.steps.length*100)+'%' } })
      ),
      React.createElement('div', { className:'chat-area' },
        chatLog.map(function(msg, i){
          return React.createElement('div', { key:i, className:'bubble-wrap ' + msg.role },
            msg.role === 'ai' && React.createElement('span', { className:'bubble-avatar' }, char.emoji),
            React.createElement('div', { className:'bubble ' + (msg.role==='user' ? (msg.isWrong?'wrong-user':'user') : 'ai') }, msg.text),
            msg.role === 'user' && React.createElement('span', { className:'bubble-avatar' }, '🧒')
          );
        }),
        typing && React.createElement('div', { className:'bubble-wrap ai' },
          React.createElement('span', { className:'bubble-avatar' }, char.emoji),
          React.createElement('div', { className:'typing' },
            React.createElement('div', { className:'dot' }), React.createElement('div', { className:'dot' }), React.createElement('div', { className:'dot' })
          )
        ),
        feedback && React.createElement('div', { className:'feedback-pop', style:{ color:feedback.color } },
          React.createElement('div', { className:'feedback-emoji' }, feedback.emoji),
          React.createElement('div', { className:'feedback-txt' }, feedback.txt)
        ),
        React.createElement('div', { ref:chatEndRef })
      ),
      showReplies && mission.steps[stepIdx] && React.createElement('div', { className:'reply-area' },
        React.createElement('div', { className:'reply-hint' }, 'Pick the best reply! 👇'),
        mission.steps[stepIdx].replies.map(function(r, i){
          return React.createElement('button', { key:i, className:'reply-btn', disabled:locked, onClick:function(){ pickReply(r); } }, r.text);
        })
      )
    )
  );

  // ── Game Over ──
  if (phase === 'gameover') return (
    React.createElement('div', { className:'screen' },
      React.createElement('div', { className:'gameover' },
        React.createElement('div', { className:'face' }, '💔'),
        React.createElement('h2', null, 'Game Over!'),
        React.createElement('p', null, kidName + ', you ran out of hearts! Better luck next time!'),
        React.createElement('div', { style:{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, margin:'14px 0' } },
          React.createElement('div', { className:'stat-card' }, React.createElement('div', { className:'stat-val' }, score), React.createElement('div', { className:'stat-lbl' }, 'Stars earned')),
          React.createElement('div', { className:'stat-card' }, React.createElement('div', { className:'stat-val' }, (stepIdx+1) + '/' + (mission && mission.steps ? mission.steps.length : 5)), React.createElement('div', { className:'stat-lbl' }, 'Rounds done'))
        )
      ),
      React.createElement('button', { className:'big-btn', onClick:playAgain, style:{ background:'linear-gradient(135deg,#7c3aed,#a855f7)', color:'#fff' } }, 'Try Again! 💪'),
      React.createElement('button', { className:'big-btn', onClick:exitGame, style:{ background:'#ede9fe', color:'#5b21b6' } }, 'Change Settings 🔧')
    )
  );

  // ── Result ──
  if (phase === 'result' && mission) {
    var max = mission.steps.length * 3;
    var pct = Math.round((score / max) * 100);
    var verdict = pct >= 90 ? 'Unbeatable! 🏆' : pct >= 70 ? 'Champion! 🌟' : pct >= 50 ? 'Well done! 👍' : 'Good effort! 💪';
    return (
      React.createElement('div', { className:'screen', style:{ textAlign:'center' } },
        React.createElement('div', { style:{ fontSize:56, marginBottom:6 } }, char.emoji),
        React.createElement('div', { style:{ fontSize:20, fontWeight:800, color:'#5b21b6', marginBottom:4 } }, kidName + ', ' + verdict),
        React.createElement('div', { className:'stat-grid' },
          React.createElement('div', { className:'stat-card' }, React.createElement('div', { className:'stat-val' }, score), React.createElement('div', { className:'stat-lbl' }, 'Stars')),
          React.createElement('div', { className:'stat-card' }, React.createElement('div', { className:'stat-val' }, pct + '%'), React.createElement('div', { className:'stat-lbl' }, 'Score')),
          React.createElement('div', { className:'stat-card' }, React.createElement('div', { className:'stat-val' }, Array.from({ length:lives }).map(function(){ return '❤️'; }).join('') || '💔'), React.createElement('div', { className:'stat-lbl' }, 'Lives left'))

          pct >= 70 && React.createElement('span', { className:'badge' }, '💬 Great Chatter'),

          lives > 0 && React.createElement('span', { className:'badge' }, '✅ Mission Complete'),

        React.createElement('button', { className:'big-btn', onClick:playAgain, style:{ background:'linear-gradient(135deg,#7c3aed,#a855f7)', color:'#fff' } }, 'Play Again! 🎲'),
        React.createElement('button', { className:'big-btn', onClick:exitGame, style:{ background:'#ede9fe', color:'#5b21b6' } }, 'Change Settings 🔧')
      )
    );
  }

  return null;
}
